<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Impulso Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050508; --surface: #0d0d14; --card: #111118;
      --border: rgba(255,255,255,0.06); --purple: #7c3aed;
      --purple-light: #a855f7; --gold: #f59e0b;
      --white: #ffffff; --gray: #6b7280; --light: #e5e7eb;
      --red: #ef4444; --green: #10b981;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

    /* CURSOR */
    .cursor { width:10px;height:10px;background:var(--purple-light);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transition:transform .1s;mix-blend-mode:screen; }
    .cursor-ring { width:36px;height:36px;border:1.5px solid rgba(168,85,247,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:width .2s,height .2s; }

    /* NAV */
    nav { width:100%;padding:0 6%;display:flex;align-items:center;justify-content:space-between;height:72px;background:rgba(5,5,8,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100; }
    .logo { font-size:1.25rem;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--white); }
    .logo .dot { color:var(--gold); }
    .nav-back { color:var(--gray);text-decoration:none;font-size:.875rem;font-weight:500;display:flex;align-items:center;gap:.4rem;transition:color .2s; }
    .nav-back:hover { color:var(--white); }

    /* MAIN */
    main { flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem; }
    .auth-wrap { width:100%;max-width:420px; }
    .auth-tag { display:inline-block;background:rgba(124,58,237,.15);border:1px solid rgba(168,85,247,.3);color:var(--purple-light);font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.35rem .9rem;border-radius:20px;margin-bottom:1.2rem; }
    .auth-title { font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:.4rem; }
    .auth-sub { color:var(--gray);font-size:.9rem;margin-bottom:2rem; }
    .auth-sub a { color:var(--purple-light);text-decoration:none; }
    .auth-sub a:hover { text-decoration:underline; }

    .auth-card { background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;position:relative;overflow:hidden; }
    .auth-card::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--purple-light),var(--gold)); }

    .form-group { margin-bottom:1rem; }
    .form-group label { display:block;font-size:.8rem;font-weight:600;color:var(--light);margin-bottom:.45rem;letter-spacing:.02em; }
    .form-group input { width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--white);font-size:.9rem;font-family:inherit;outline:none;transition:all .2s; }
    .form-group input::placeholder { color:var(--gray); }
    .form-group input:focus { border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.05); }
    .form-group input.error { border-color:rgba(239,68,68,.5); }

    .forgot-link { text-align:right;margin-top:-.4rem;margin-bottom:1rem; }
    .forgot-link a { color:var(--gray);font-size:.8rem;text-decoration:none;transition:color .2s; }
    .forgot-link a:hover { color:var(--purple-light); }

    .auth-btn { width:100%;padding:.9rem;background:linear-gradient(135deg,var(--purple),var(--purple-light));border:none;border-radius:10px;color:white;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.5rem; }
    .auth-btn:hover { box-shadow:0 6px 24px rgba(124,58,237,.4);transform:translateY(-1px); }
    .auth-btn:disabled { opacity:.6;cursor:not-allowed;transform:none; }

    .divider { display:flex;align-items:center;gap:1rem;margin:1.2rem 0;color:var(--gray);font-size:.8rem; }
    .divider::before, .divider::after { content:'';flex:1;height:1px;background:var(--border); }

    .google-btn { width:100%;padding:.85rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--white);font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.6rem; }
    .google-btn:hover { background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15); }
    .google-btn svg { width:18px;height:18px; }

    .msg-box { padding:.75rem 1rem;border-radius:8px;font-size:.85rem;font-weight:500;margin-bottom:1rem;display:none; }
    .msg-box.error { background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block; }
    .msg-box.success { background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;display:block; }

    .reset-wrap { display:none; }
    .reset-wrap.active { display:block; }
    .back-btn { background:none;border:none;color:var(--purple-light);font-size:.85rem;cursor:pointer;padding:0;font-family:inherit;margin-bottom:1.2rem;display:flex;align-items:center;gap:.3rem; }

    /* SPINNER */
    .spinner { width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* FOOTER */
    footer { text-align:center;padding:1.5rem;color:var(--gray);font-size:.8rem;border-top:1px solid var(--border); }
    footer a { color:var(--purple-light);text-decoration:none; }

    /* TOAST */
    .toast { position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.4rem;font-size:.875rem;font-weight:500;transform:translateY(100px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:9999;max-width:320px; }
    .toast.show { transform:translateY(0);opacity:1; }
    .toast.error { border-color:rgba(239,68,68,.3);color:#fca5a5; }
    .toast.success { border-color:rgba(16,185,129,.3);color:#6ee7b7; }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="logo">IMPULSO<span class="dot">.</span></a>
  <a href="index.html" class="nav-back">← Back to site</a>
</nav>

<main>
  <div class="auth-wrap">
    <span class="auth-tag">Client Portal</span>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Don't have an account? <a href="signup.html">Create one →</a></p>

    <!-- LOGIN FORM -->
    <div class="auth-card" id="loginForm">
      <div class="msg-box" id="loginMsg"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Your password" />
      </div>
      <div class="forgot-link"><a href="#" onclick="showReset()">Forgot password?</a></div>

      <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
        Log In →
      </button>

      <div class="divider">or</div>

      <button class="google-btn" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- RESET PASSWORD FORM -->
    <div class="auth-card reset-wrap" id="resetForm">
      <button class="back-btn" onclick="hideReset()">← Back to login</button>
      <div class="msg-box" id="resetMsg"></div>
      <p style="color:var(--gray);font-size:.875rem;margin-bottom:1.2rem;">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="resetEmail" placeholder="you@example.com" />
      </div>
      <button class="auth-btn" id="resetBtn" onclick="handleReset()">Send Reset Link</button>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 Impulso Operations · <a href="index.html">Back to site</a></p>
</footer>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG — Replace with your Firebase project values
// Get from: console.firebase.google.com → Project Settings → Your apps
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDzlsfhbMYuYBmvVfvpamBI2R-Kj9eu_Nw",
  authDomain: "impulso-f1914.firebaseapp.com",
  projectId: "impulso-f1914",
  storageBucket: "impulso-f1914.firebasestorage.app",
  messagingSenderId: "650206259070",
  appId: "1:650206259070:web:577c88ea6fb35be022b52f"
};

// Initialize Firebase
let auth;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
} catch(e) {
  console.warn('Firebase not configured yet');
}

// Check if already logged in
if (auth) {
  auth.onAuthStateChanged(user => {
    if (user && user.emailVerified) {
      window.location.href = 'dashboard.html';
    }
  });
}

async function handleLogin() {
  if (!auth) return showToast('Firebase not configured yet.', 'error');
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');
  msg.className = 'msg-box';
  msg.textContent = '';

  if (!email || !pass) {
    msg.className = 'msg-box error';
    msg.textContent = 'Please fill in all fields.';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const result = await auth.signInWithEmailAndPassword(email, pass);
    if (!result.user.emailVerified) {
      await auth.signOut();
      msg.className = 'msg-box error';
      msg.textContent = 'Please verify your email first. Check your inbox for the verification link.';
      btn.disabled = false;
      btn.textContent = 'Log In →';
      return;
    }
    showToast('Welcome back! Redirecting...', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  } catch(err) {
    btn.disabled = false;
    btn.textContent = 'Log In →';
    msg.className = 'msg-box error';
    msg.textContent = firebaseError(err.code);
  }
}

async function handleGoogleLogin() {
  if (!auth) return showToast('Firebase not configured yet.', 'error');
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    showToast('Signed in! Redirecting...', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  } catch(err) {
    showToast(firebaseError(err.code), 'error');
  }
}

async function handleReset() {
  if (!auth) return showToast('Firebase not configured yet.', 'error');
  const email = document.getElementById('resetEmail').value.trim();
  const btn = document.getElementById('resetBtn');
  const msg = document.getElementById('resetMsg');
  if (!email) {
    msg.className = 'msg-box error';
    msg.textContent = 'Enter your email address.';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';
  try {
    await auth.sendPasswordResetEmail(email);
    msg.className = 'msg-box success';
    msg.textContent = 'Reset link sent! Check your inbox.';
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  } catch(err) {
    msg.className = 'msg-box error';
    msg.textContent = firebaseError(err.code);
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}

function showReset() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('resetForm').classList.add('active');
}
function hideReset() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('resetForm').classList.remove('active');
}

function firebaseError(code) {
  const map = {
    'auth/invalid-email': 'Invalid email address.',
    'auth/user-not-found': 'No account with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/too-many-requests': 'Too many attempts. Try again later.',
    'auth/invalid-credential': 'Invalid email or password.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Try again.';
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('resetForm').classList.contains('active')) handleLogin();
    else handleReset();
  }
});

// Custom cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX - 5 + 'px';
  cursor.style.top = e.clientY - 5 + 'px';
  rx += (e.clientX - 18 - rx) * 0.15;
  ry += (e.clientY - 18 - ry) * 0.15;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
});
function animRing() { requestAnimationFrame(animRing); }
animRing();
if (window.innerWidth < 768) { cursor.style.display='none'; ring.style.display='none'; }
</script>
</body>
</html>
