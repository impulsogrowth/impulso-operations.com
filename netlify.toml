[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

[functions."discord-setup"]
  node_bundler = "nft"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS, GET"
